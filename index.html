<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vextris</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }
        html {
            background: radial-gradient(circle at center, #0a1a2f 0%, #050505 100%);
            height: 100%;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            position: fixed;
            inset: 0;
            -webkit-tap-highlight-color: transparent;
        }
        #game {
            position: relative;
            box-shadow: 0 0 60px rgba(0, 191, 255, 0.15), 0 0 20px rgba(0, 0, 0, 0.5);
            border: 4px solid #1a1a1a;
            border-radius: 8px;
            background: #000;
        }

        /* Rising Dread effect - dirt rising from grave */
        #rising-dirt-overlay {
            position: fixed;
            bottom: 112px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 0;
            pointer-events: none;
            background: radial-gradient(
                ellipse at center,
                rgba(139, 69, 19, 0.9) 0%,
                rgba(80, 50, 30, 0.7) 40%,
                rgba(101, 67, 33, 0.5) 70%,
                rgba(80, 50, 30, 0) 100%
            );
            opacity: 0;
            z-index: 100;
            border-radius: 50% 50% 0 0;
            box-shadow: 0 -4px 20px rgba(80, 50, 30, 0.6);
        }

        .rising-dirt-active {
            animation: rising-dirt 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes rising-dirt {
            0% {
                height: 0;
                opacity: 0;
            }
            20% {
                height: 20px;
                opacity: 0.8;
            }
            50% {
                height: 80px;
                opacity: 0.9;
            }
            80% {
                height: 60px;
                opacity: 0.5;
            }
            100% {
                height: 0;
                opacity: 0;
            }
        }

        /* Rising Dread warning flash */
        .rising-warning {
            animation: rising-warning-flash 0.2s ease-out forwards;
        }

        @keyframes rising-warning-flash {
            0% {
                border-bottom-color: #1a1a1a;
            }
            50% {
                border-bottom-color: #FF6347;
                box-shadow: 0 -2px 8px rgba(255, 99, 71, 0.6) inset;
            }
            100% {
                border-bottom-color: #1a1a1a;
            }
        }

        canvas {
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        // Prevent zoom on wheel + Ctrl
        document.addEventListener('wheel', function (e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        // Prevent gesturezoom on iOS/macOS
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });

        // Prevent multi-touch zoom
        document.addEventListener('touchstart', function (e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // Prevent keyboard zoom (Ctrl + plus, minus, zero)
        document.addEventListener('keydown', function (e) {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
                e.preventDefault();
            }
        });
    </script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
