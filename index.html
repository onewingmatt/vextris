<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Vextris</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }
        html {
            background: radial-gradient(circle at center, #1a1018 0%, #07060b 100%);
            height: 100%;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            position: fixed;
            inset: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Occult Typography Mixin */
        .occult-title {
            font-family: 'Cinzel', serif;
            color: #d1bfae; /* Ash gray / faded parchment */
            text-shadow: 2px 2px 4px #000;
        }

        #game {
            position: relative;
            width: 640px;
            height: 768px;
            overflow: hidden;
            box-shadow: 0 0 44px rgba(90, 36, 44, 0.42), 0 0 12px rgba(0, 0, 0, 0.82);
            border: 4px solid #4a272d;
            border-radius: 4px;
            background: #07060b;
        }

        #game::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background:
                radial-gradient(circle at 50% 32%, rgba(208, 173, 132, 0.08), rgba(0, 0, 0, 0) 52%),
                linear-gradient(180deg, rgba(64, 30, 38, 0.22) 0%, rgba(0, 0, 0, 0) 38%, rgba(0, 0, 0, 0.34) 100%);
            mix-blend-mode: screen;
        }

        #game::after {
            content: "";
            position: absolute;
            inset: 10px;
            pointer-events: none;
            z-index: 2;
            border: 1px solid rgba(208, 173, 132, 0.16);
            border-radius: 2px;
        }

        /* --- Menus & Overlays --- */
        .overlay-screen {
            position: absolute;
            inset: 0;
            background: #0c0912;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .overlay-screen h1 {
            font-size: 4rem;
            margin-bottom: 0.2em;
            letter-spacing: 2px;
        }
        .overlay-screen h2 {
            font-size: 1.2rem;
            color: #8a2a2a; /* Blood red mute */
            margin-bottom: 2em;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
        }
        .styled-btn {
            background: #1f1722;
            border: 2px solid #66353d;
            color: #d1bfae;
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            padding: 12px 30px;
            margin: 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .styled-btn:hover {
            background: #66353d;
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(181, 101, 87, 0.44);
        }

        #btn-abandon-rite {
            border-color: #9d5750;
            color: #c47d74;
        }

        /* Grimoire specific layout */
        #grimoire-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 90%;
            max-height: 50vh;
            overflow-y: auto;
            margin-bottom: 30px;
        }
        
        .grimoire-pact {
            background: #151020;
            border: 1px solid #3a1a1e;
            padding: 10px;
            text-align: left;
            color: #d1bfae;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            line-height: 1.5;
        }
        .grimoire-pact h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: #a43a3a;
            margin: 0 0 5px 0;
        }
        .grimoire-pact .flavor {
            font-style: italic;
            color: #7a6a7e;
            margin-top: 8px;
            display: block;
        }

        .hidden {
            display: none !important;
        }

        /* Rising Dread effect - dirt rising from grave */
        #rising-dirt-overlay {
            position: fixed;
            bottom: 112px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 0;
            pointer-events: none;
            background: radial-gradient(
                ellipse at center,
                rgba(139, 69, 19, 0.9) 0%,
                rgba(80, 50, 30, 0.7) 40%,
                rgba(101, 67, 33, 0.5) 70%,
                rgba(80, 50, 30, 0) 100%
            );
            opacity: 0;
            z-index: 100;
            border-radius: 50% 50% 0 0;
            box-shadow: 0 -4px 20px rgba(80, 50, 30, 0.6);
        }

        .rising-dirt-active {
            animation: rising-dirt 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes rising-dirt {
            0% {
                height: 0;
                opacity: 0;
            }
            20% {
                height: 20px;
                opacity: 0.8;
            }
            50% {
                height: 80px;
                opacity: 0.9;
            }
            80% {
                height: 60px;
                opacity: 0.5;
            }
            100% {
                height: 0;
                opacity: 0;
            }
        }

        /* Rising Dread warning flash */
        .rising-warning {
            animation: rising-warning-flash 0.2s ease-out forwards;
        }

        @keyframes rising-warning-flash {
            0% {
                border-bottom-color: #1a1a1a;
            }
            50% {
                border-bottom-color: #c76f5f;
                box-shadow: 0 -2px 8px rgba(199, 111, 95, 0.58) inset;
            }
            100% {
                border-bottom-color: #1a1a1a;
            }
        }

        canvas {
            display: block;
            width: 640px;
            height: 768px;
            image-rendering: pixelated;
            touch-action: none;
            position: relative;
            z-index: 1;
        }
    </style>
  <script type="module" crossorigin src="./assets/index-Dgv_R9eP.js"></script>
</head>
<body>
    <div id="game">
        <!-- Overlays -->
        <div id="main-menu" class="overlay-screen">
            <h1 class="occult-title">Vextris</h1>
            <h2>The Rite of Descent</h2>
            <button id="btn-begin-rite" class="styled-btn">Begin the Rite</button>
        </div>

        <div id="pause-screen" class="overlay-screen hidden">
            <h1 class="occult-title">The Grimoire</h1>
            <h2>Active Pacts</h2>
            <div id="grimoire-list">
                <!-- Javascript will inject list here -->
            </div>
            <button id="btn-resume-rite" class="styled-btn">Resume Ritual</button>
            <button id="btn-abandon-rite" class="styled-btn">Abandon Rite</button>
        </div>
    </div>
    <script>
        // Prevent zoom on wheel + Ctrl
        document.addEventListener('wheel', function (e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        // Prevent gesturezoom on iOS/macOS
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });

        // Prevent multi-touch zoom
        document.addEventListener('touchstart', function (e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // Prevent keyboard zoom (Ctrl + plus, minus, zero)
        document.addEventListener('keydown', function (e) {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
