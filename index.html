<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vextris</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }
        html {
            background: radial-gradient(circle at center, #0a1a2f 0%, #050505 100%);
            height: 100%;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            position: fixed;
            inset: 0;
            -webkit-tap-highlight-color: transparent;
        }
        #game {
            position: relative;
            box-shadow: 0 0 60px rgba(0, 191, 255, 0.15), 0 0 20px rgba(0, 0, 0, 0.5);
            border: 4px solid #1a1a1a;
            border-radius: 8px;
            background: #000;
        }
        canvas {
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        // Prevent zoom on wheel + Ctrl
        document.addEventListener('wheel', function (e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        // Prevent gesturezoom on iOS/macOS
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });

        // Prevent multi-touch zoom
        document.addEventListener('touchstart', function (e) {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // Prevent keyboard zoom (Ctrl + plus, minus, zero)
        document.addEventListener('keydown', function (e) {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
                e.preventDefault();
            }
        });
    </script>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
